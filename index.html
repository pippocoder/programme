<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Programme">
<title>Programme</title>
<style>
:root{--bg:#0f0f0f;--s1:#1a1a1a;--s2:#242424;--bd:rgba(255,255,255,0.07);--tx:#f0ede8;--mu:#6e6a64;--fa:#2e2e2e;--sw:#4a9eff;--sw2:rgba(74,158,255,0.13);--pu:#3ecf8e;--pu2:rgba(62,207,142,0.13);--pl:#a78bfa;--pl2:rgba(167,139,250,0.13);--re:#5a5652;--re2:rgba(90,86,82,0.15);--aw:#fb923c;--aw2:rgba(251,146,60,0.13)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;padding-bottom:56px}

/* HEADER */
.hd{background:rgba(15,15,15,.94);-webkit-backdrop-filter:blur(24px);backdrop-filter:blur(24px);padding:54px 20px 0;position:sticky;top:0;z-index:20;border-bottom:1px solid var(--bd)}
.hd-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:18px}
.app-name{font-size:26px;font-weight:700;letter-spacing:-.7px}
.btn-today{font-size:13px;color:var(--sw);background:var(--sw2);border:none;padding:6px 14px;border-radius:20px;cursor:pointer;font-weight:600}
.wk-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.wk-arr{background:none;border:none;font-size:22px;color:var(--mu);cursor:pointer;padding:2px 4px;line-height:1}
.wk-lbl{font-size:11px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--mu)}
.strip{display:flex;gap:3px;overflow-x:auto;padding:0 20px 12px;margin:0 -20px;scrollbar-width:none}
.strip::-webkit-scrollbar{display:none}
.sd{display:flex;flex-direction:column;align-items:center;gap:4px;padding:7px 9px 9px;border-radius:11px;cursor:pointer;min-width:40px;flex-shrink:0}
.sd.on{background:var(--s2)}
.sd-n{font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--mu)}
.sd-d{font-size:16px;font-weight:600;color:var(--mu);letter-spacing:-.2px}
.sd.on .sd-d{color:var(--tx)}
.sd.today .sd-d{color:var(--sw)}
.pip{width:5px;height:5px;border-radius:50%;background:var(--fa)}
.pip.swim{background:var(--sw)}.pip.push{background:var(--pu)}.pip.pull{background:var(--pl)}.pip.away{background:var(--aw)}.pip.rest{background:var(--re)}

/* CONTENT */
.cnt{padding:18px 16px}

/* HERO */
.hero{border-radius:20px;padding:20px;margin-bottom:12px;position:relative;overflow:hidden}
.hero.swim{background:var(--sw2);border:1px solid rgba(74,158,255,.2)}
.hero.push{background:var(--pu2);border:1px solid rgba(62,207,142,.2)}
.hero.pull{background:var(--pl2);border:1px solid rgba(167,139,250,.2)}
.hero.rest{background:var(--re2);border:1px solid rgba(90,86,82,.2)}
.hero.away{background:var(--aw2);border:1px solid rgba(251,146,60,.2)}
.hero-tag{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:3px 9px;border-radius:20px;margin-bottom:10px}
.swim .hero-tag{color:var(--sw);background:rgba(74,158,255,.15)}
.push .hero-tag{color:var(--pu);background:rgba(62,207,142,.15)}
.pull .hero-tag{color:var(--pl);background:rgba(167,139,250,.15)}
.rest .hero-tag{color:var(--mu);background:rgba(90,86,82,.2)}
.away .hero-tag{color:var(--aw);background:rgba(251,146,60,.15)}
.tag-dot{width:5px;height:5px;border-radius:50%;background:currentColor}
.hero-title{font-size:22px;font-weight:700;letter-spacing:-.5px;margin-bottom:8px;line-height:1.2}
.swim .hero-title{color:var(--sw)}.push .hero-title{color:var(--pu)}.pull .hero-title{color:var(--pl)}.rest .hero-title{color:#8a8680}.away .hero-title{color:var(--aw)}
.hero-desc{font-size:14px;line-height:1.6;color:rgba(240,237,232,.75)}

/* TIP */
.tip{display:flex;gap:10px;background:var(--s1);border-radius:13px;padding:12px 13px;margin-bottom:12px;border:1px solid var(--bd)}
.tip-ic{font-size:14px;flex-shrink:0;margin-top:1px}
.tip-tx{font-size:13px;line-height:1.55;color:rgba(240,237,232,.65)}

/* CARD */
.card{background:var(--s1);border-radius:17px;padding:15px;margin-bottom:12px;border:1px solid var(--bd)}
.card-lbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--mu);margin-bottom:13px}

/* EXO */
.exo{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;padding:11px 0;border-bottom:1px solid var(--bd)}
.exo:last-child{border-bottom:none;padding-bottom:0}
.exo:first-child{padding-top:0}
.exo-l{flex:1;min-width:0}
.exo-name{font-size:15px;font-weight:600;color:var(--tx);margin-bottom:3px;letter-spacing:-.1px}
.exo-tip{font-size:12px;line-height:1.45;color:var(--mu)}
.exo-b{flex-shrink:0;text-align:center;background:var(--s2);border-radius:10px;padding:7px 10px;min-width:50px}
.exo-sets{font-size:15px;font-weight:700;color:var(--tx);letter-spacing:-.2px}
.exo-reps{font-size:11px;color:var(--mu);font-weight:500;margin-top:1px}

/* SWIM */
.sw-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--bd);gap:12px}
.sw-row:last-child{border-bottom:none}.sw-row:first-child{padding-top:0}
.sw-name{font-size:15px;font-weight:600;color:var(--tx);margin-bottom:2px}
.sw-sub{font-size:12px;color:var(--mu)}
.sw-dur{font-size:15px;font-weight:700;color:var(--sw);flex-shrink:0}

/* MEALS */
.meal{padding:11px 0;border-bottom:1px solid var(--bd)}
.meal:last-child{border-bottom:none;padding-bottom:0}.meal:first-child{padding-top:0}
.meal-slot{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--mu);margin-bottom:3px}
.meal-name{font-size:15px;font-weight:600;color:var(--tx);margin-bottom:4px;letter-spacing:-.1px}
.meal-detail{font-size:13px;line-height:1.5;color:var(--mu)}
</style>
</head>
<body>

<div class="hd">
  <div class="hd-top">
    <span class="app-name">Programme</span>
    <button class="btn-today" onclick="goToday()">Aujourd'hui</button>
  </div>
  <div class="wk-nav">
    <button class="wk-arr" onclick="prevWk()">‹</button>
    <span class="wk-lbl" id="wk-lbl"></span>
    <button class="wk-arr" onclick="nextWk()">›</button>
  </div>
  <div class="strip" id="strip"></div>
</div>

<div class="cnt" id="cnt"></div>

const SWIM_PLAN=[

const PUSH={lbl:'Séance A — Pectoraux · Épaules · Triceps',list:[
  {n:'Pompes classiques',s:'4',r:'12–15',t:'Tempo 3/1/2 : descends en 3 sec, pause 1 sec en bas, remonte en 2 sec. La lenteur crée la tension musculaire.'},
  {n:'Pompes inclinées',s:'3',r:'12',t:'Mains sur une chaise ou le bord du canapé. Travaille le bas des pectoraux.'},

  {n:'Tirages serviette + porte',s:'4',r:'12–15',t:'Noue une serviette solide autour d\'une poignée de porte. Tiens un bout par main, recule d\'un pas, incline ton corps et tire vers toi. Excellent pour le dos et les biceps.'},
  {n:'Superman allongé',s:'3',r:'15',t:'Ventre au sol, bras tendus devant. Lève bras et jambes simultanément, tiens 2 sec en haut. Lombaires + haut du dos.'},

  {n:'Face pull serviette',s:'3',r:'12',t:'Serviette autour d\'une poignée de porte. Tire les deux bouts vers ton visage en écartant les coudes — deltoïdes arrière et trapèzes.'},

  {d:'2025-06-23',t:'pull',l:'Séance B — Pull',x:'Tirages serviette, superman, reverse angel, curls, face pull. 35 min.',tip:'Le tirage à la serviette : noue-la autour d\'une poignée de porte solide, recule et tire. Surprenant d\'efficacité.'},
  {d:'2025-06-24',t:'swim',l:'Natation',x:'Intervalles aujourd\'hui : 25m vite puis 25m récup, ×10–12. 40 min total. Plus intense que la première séance.'},
  {d:'2025-06-25',t:'rest',l:'Repos actif',x:'Marche 20 min si tu peux. Étirements épaules et dos (10 min le soir).'},
  {d:'2025-06-26',t:'push',l:'Séance A — Push',x:'Sortie tôt (17–18h) — profites-en. Séance complète pompes + dips + épaules. 35 min.',tip:'Tu devrais déjà sentir une légère progression par rapport à mercredi.'},
  {d:'2025-06-27',t:'swim',l:'Natation (bonus)',x:'Deuxième natation si tu as l\'énergie. Excellent pour les épaules. Sinon repos — c\'est un bonus.'},
  {d:'2025-06-28',t:'rest',l:'Repos',x:'Repos complet.'},
  {d:'2025-06-29',t:'rest',l:'Repos',x:'Lundi = repos.'},
  {d:'2025-06-30',t:'pull',l:'Séance B — Pull',x:'Séance importante avant l\'absence. Donne tout. 35 min.',tip:'Dernière vraie séance avant 5 jours. Fais-la complète.'},
  {d:'2025-07-01',t:'away',l:'Absent · déplacement',x:'Si piscine → nage 30 min. Sinon : 3×15 pompes + 3×12 dips au réveil. 10 min chrono.',tip:'Le but est de garder le signal musculaire actif, pas de progresser.'},

  {d:'2025-07-07',t:'push',l:'Séance A+ — Push intensifié',x:'Reprise. Passe à 4 séries sur tout. La mémoire musculaire fonctionne — tu retrouves ton niveau en 1–2 séances.',tip:'Ne sois pas surpris si tu te sens fort dès aujourd\'hui. La mémoire musculaire est réelle.'},

  {d:'2025-07-31',t:'rest',l:'Bilan final 🎯',x:'Pèse-toi. Note les changements visuels. +1.5 à 2.5 kg de masse maigre attendus. Tu pars en congés avec une vraie base. On reprend fin août.',tip:'6 semaines de régularité. C\'est exactement ce qu\'il fallait.'}
];

const TLBL={push:'Muscu Push',pull:'Muscu Pull',swim:'Natation',rest:'Repos',away:'Absent'};
function dk(d){return d.toISOString().slice(0,10)}
function pd(s){const[y,m,dd]=s.split('-').map(Number);return new Date(y,m-1,dd)}
function gw(d){const w=d.getDay(),df=w===0?-6:1-w,r=new Date(d);r.setDate(d.getDate()+df);r.setHours(0,0,0,0);return r}
function gd(d){const k=dk(d);return PROG.find(p=>p.d===k)||null}

const TR=new Date();TR.setHours(0,0,0,0);
const ST=pd('2025-06-17'),EN=pd('2025-07-31');
let cur=new Date(TR);
if(cur<ST)cur=new Date(ST);
if(cur>EN)cur=new Date(EN);
let ws=gw(cur);

function rStrip(){
  const el=document.getElementById('strip');
  el.innerHTML='';
  for(let i=0;i<7;i++){
    const d=new Date(ws);d.setDate(ws.getDate()+i);
    const data=gd(d),t=data?data.t:'rest';
    const on=dk(d)===dk(cur),tod=dk(d)===dk(TR)&&!on;
    const b=document.createElement('div');
    b.className='sd'+(on?' on':'')+(tod?' today':'');
    b.innerHTML=`<span class="sd-n">${FRD[d.getDay()]}</span><span class="sd-d">${d.getDate()}</span><span class="pip ${t}"></span>`;
    b.onclick=()=>{cur=new Date(d);rStrip();rDay()};
    el.appendChild(b);
  }
  setTimeout(()=>{const a=el.querySelector('.on');if(a)a.scrollIntoView({inline:'center',behavior:'smooth',block:'nearest'})},40);
  const e=new Date(ws);e.setDate(ws.getDate()+6);
  document.getElementById('wk-lbl').textContent=ws.getDate()+' '+FRM[ws.getMonth()]+' – '+e.getDate()+' '+FRM[e.getMonth()];
}

function rDay(){
  const data=gd(cur),el=document.getElementById('cnt');
  if(!data){el.innerHTML='<p style="color:var(--mu);padding:20px;font-size:14px">Hors programme.</p>';return}
  const t=data.t;let h='';

  h+=`<div class="hero ${t}"><div class="hero-tag"><span class="tag-dot"></span>${TLBL[t]}</div><div class="hero-title">${data.l}</div><div class="hero-desc">${data.x}</div></div>`;
  if(data.tip)h+=`<div class="tip"><span class="tip-ic">💡</span><span class="tip-tx">${data.tip}</span></div>`;

  if(t==='push')h+=exo(PUSH);
  else if(t==='pull')h+=exo(PULL);
  else if(t==='swim')h+=swim();

  if(t!=='away'){
    const wd=cur.getDay(),bi=wd===0?6:wd-1;
    const bf=BF[bi%BF.length];
    const din=t==='swim'?DS[wd%DS.length]:DN[wd%DN.length];
    h+=`<div class="card"><div class="card-lbl">Nutrition du jour</div>
    <div class="meal"><div class="meal-slot">Petit-déjeuner · 7h05</div><div class="meal-name">${bf.n}</div><div class="meal-detail">${bf.d}</div></div>
    <div class="meal"><div class="meal-slot">Déjeuner · bureau</div><div class="meal-name">${LUNCH.n}</div><div class="meal-detail">${LUNCH.d}</div></div>
    <div class="meal"><div class="meal-slot">Dîner${t==='swim'?' · dans les 45 min':' · ~21h'}</div><div class="meal-name">${din.n}</div><div class="meal-detail">${din.d}</div></div>
    </div>`;
  }
  el.innerHTML=h;
}

function exo(plan){
  let h=`<div class="card"><div class="card-lbl">${plan.lbl}</div>`;
  plan.list.forEach(e=>{h+=`<div class="exo"><div class="exo-l"><div class="exo-name">${e.n}</div><div class="exo-tip">${e.t}</div></div><div class="exo-b"><div class="exo-sets">${e.s}</div><div class="exo-reps">${e.r}</div></div></div>`});
  return h+'</div>';
}

function swim(){
  let h=`<div class="card"><div class="card-lbl">Plan séance · 40 min</div>`;
  SWIM_PLAN.forEach(p=>{h+=`<div class="sw-row"><div><div class="sw-name">${p.n}</div><div class="sw-sub">${p.s}</div></div><div class="sw-dur">${p.t}</div></div>`});
  return h+'</div>';
}

function prevWk(){ws.setDate(ws.getDate()-7);cur=new Date(ws);if(cur<ST)cur=new Date(ST);rStrip();rDay()}
function nextWk(){ws.setDate(ws.getDate()+7);cur=new Date(ws);if(cur>EN)cur=new Date(EN);rStrip();rDay()}
function goToday(){cur=new Date(TR);if(cur<ST)cur=new Date(ST);if(cur>EN)cur=new Date(EN);ws=gw(cur);rStrip();rDay()}

rStrip();rDay();
</script>
</body>
</html>
